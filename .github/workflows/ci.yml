name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  skill-lint:
    name: Skill lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Lint skills
        run: python3 bin/lint-skills.py
