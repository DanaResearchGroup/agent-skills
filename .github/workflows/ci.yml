name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  skill-lint:
    name: Skill lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Lint skills
        run: python3 bin/lint-skills.py

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Explicit so the repo allowlist applies regardless of auto-detection.
          GITLEAKS_CONFIG: ${{ github.workspace }}/.gitleaks.toml
